<!DOCTYPE html>
<html>

<!--
  Reward Quiz Frontend

  This page provides a simple user interface for the reward quiz system.
  Users can:
  - Create a new customer
  - Select an existing customer
  - Answer quiz questions
  - View their final reward score

  The page communicates with the Spring Boot backend using REST API calls.
-->

<head>
  <title>Reward Quiz</title>

  <!-- Basic styling for the quiz interface -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;

      display: flex;
      justify-content: center;
      align-items: center;

      height: 100vh;
      margin: 0;
    }

    .container {
      width: 650px;
      padding: 40px;

      background: white;
      border-radius: 12px;

      box-shadow: 0px 8px 25px rgba(0,0,0,0.12);

      text-align: center;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 18px;
      margin: 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    input {
      padding: 10px;
      width: 60%;
      margin: 10px;
    }

    select {
      padding: 8px;
    }
  </style>
</head>

<body>

<!-- Main container that holds the entire quiz interface -->
<div class="container">
  <h1>Quiz</h1>
  <p style="color: #555; font-size: 14px; margin-bottom: 25px;">
    Scoring: Each correct answer earns <b>10 points</b>, each incorrect answer deducts <b>5 points</b>. Maximum score is <b>30 points</b>.
    Click <b>Create Customer</b> to make a new customer, then select a customer from the drop-down list and finally click <b>Begin</b> to start the quiz.
  </p>


  <!--
    Customer Section

    Allows the user to:
    - Create a new customer
    - Select an existing customer
    - Start the quiz
  -->
<div id="customerSection">
  <h3>Select Customer</h3>
  <button onclick="createCustomer()">Create New Customer</button>
  <select id="customerSelect"></select>
  <button onclick="startQuiz()">Start Quiz</button>
</div>



  <!--
    Quiz Section

    Displays the current quiz question and allows
    the user to submit answers or navigate back.
  -->
  <div id="quizSection" style="display:none;">
    <h3 id="questionText"></h3>

    <input type="text" id="answerInput" placeholder="Enter your answer"/>

    <div>
      <button onclick="previousQuestion()">Back</button>
      <button onclick="submitAnswer()">Next</button>
    </div>

    <p id="progress"></p>
  </div>



  <!--
    Result Section

    Displays the final reward score after the quiz
    has been completed.
  -->
<div id="resultSection" style="display:none;">
  <h2>Quiz Completed!</h2>
  <p id="finalScore"></p>
  <button onclick="goToStart()">Back to Start</button>
</div>

</div>

<script>

  /**
   * Quiz Application Frontend Logic
   *
   * Handles:
   * - Customer creation
   * - Quiz loading
   * - Answer submission
   * - Score retrieval
   * - UI navigation between quiz stages
   */

  let customerId = null;
  let questions = [];
  let currentQuestionIndex = 0;

  // Load customers on page load
  window.onload = async function() {
    await loadCustomers();
  };

  /**
   * Loads all customers from the backend
   * and populates the customer selection dropdown.
   */
  async function loadCustomers() {
    const response = await fetch('/customers');
    const customers = await response.json();

    const select = document.getElementById('customerSelect');
    select.innerHTML = '<option value="">-- Select a Customer --</option>';

    customers.forEach(customer => {
      const option = document.createElement('option');
      option.value = customer.id;
      option.text = "Customer " + customer.id + " (Points: " + customer.rewardPoints + ")";
      select.appendChild(option);
    });
  }

  /**
   * Sends a request to the backend to create
   * a new customer and then refreshes the customer list.
   */
  async function createCustomer() {
    const response = await fetch('/customers', { method: 'POST' });
    await loadCustomers();
  }

  /**
   * Starts the quiz for the selected customer.
   * Retrieves quiz questions from the backend
   * and displays the first question.
   */
  async function startQuiz() {
    const select = document.getElementById('customerSelect');
    customerId = select.value;

    const response = await fetch('/questions');
    questions = await response.json();

    currentQuestionIndex = 0;

    document.getElementById('customerSection').style.display = 'none';
    document.getElementById('quizSection').style.display = 'block';

    showQuestion();
  }

  /**
   * Displays the current question and updates
   * the quiz progress indicator.
   */
  function showQuestion() {

    const question = questions[currentQuestionIndex];

    document.getElementById('questionText').innerText = question.questionText;

    document.getElementById('progress').innerText =
        "Question " + (currentQuestionIndex + 1) + " of " + questions.length;

    document.getElementById('answerInput').value = "";

    document.getElementById('backBtn').disabled = currentQuestionIndex === 0;

  }

  /**
   * Submits the current answer to the backend
   * and moves to the next question.
   */
  async function submitAnswer() {

    const answer = document.getElementById('answerInput').value;

    await fetch(`/customers/${customerId}/answer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        questionId: questions[currentQuestionIndex].id,
        answer: answer
      })
    });

    document.getElementById('answerInput').value = '';

    currentQuestionIndex++;

    if (currentQuestionIndex < questions.length) {
      showQuestion();
    } else {
      await finishQuiz();
    }
  }

  /**
   * Finalizes the quiz for the current customer
   * and retrieves the final reward points.
   */
  async function finishQuiz() {

    await fetch(`/customers/${customerId}/finish`, {
      method: 'POST'
    });

    const response = await fetch(`/customers`);
    const customers = await response.json();

    const customer = customers.find(c => c.id == customerId);

    if (!customer) {
      alert("Customer not found.");
      return;
    }

    document.getElementById('quizSection').style.display = 'none';
    document.getElementById('resultSection').style.display = 'block';

    document.getElementById('finalScore').innerText =
        "Final Reward Points: " + customer.rewardPoints;
  }

  /**
   * Resets the quiz state and returns
   * the user to the customer selection screen.
   */
  function goToStart() {

    // Reset quiz state
    currentQuestionIndex = 0;
    questions = [];
    customerId = null;

    // Hide result & quiz
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('quizSection').style.display = 'none';

    // Show customer selection
    document.getElementById('customerSection').style.display = 'block';

    // Clear answer input
    document.getElementById('answerInput').value = '';

    // Reload customers (to update points display)
    loadCustomers();
  }

  /**
   * Navigates back to the previous question.
   * If on the first question, returns to the start screen.
   */
  function previousQuestion() {

    // If we are on the first question, go back to home
    if (currentQuestionIndex === 0) {
      goToStart();
      return;
    }

    // Otherwise go to previous question
    currentQuestionIndex--;
    showQuestion();
  }

</script>

</body>
</html>
