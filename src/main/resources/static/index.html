<!DOCTYPE html>
<html>
<head>
  <title>Reward Quiz</title>
</head>
<body>

<h1>Customer Quiz System</h1>

<!-- Customer Selection -->
<div id="customerSection">
  <h3>Select Customer</h3>
  <select id="customerSelect"></select>
  <button onclick="createCustomer()">Create New Customer</button>
  <button onclick="startQuiz()">Start Quiz</button>
</div>

<hr>

<!-- Quiz Section -->
<div id="quizSection" style="display:none;">
  <h3 id="questionText"></h3>
  <input type="text" id="answerInput" placeholder="Enter your answer"/>
  <button onclick="submitAnswer()">Submit</button>
  <p id="progress"></p>
</div>

<hr>

<!-- Result Section -->
<div id="resultSection" style="display:none;">
  <h2>Quiz Completed!</h2>
  <p id="finalScore"></p>
  <button onclick="goToStart()">Back to Start</button>
</div>

<script>

  let customerId = null;
  let questions = [];
  let currentQuestionIndex = 0;

  // Load customers on page load
  window.onload = async function() {
    await loadCustomers();
  };

  async function loadCustomers() {
    const response = await fetch('/customers');
    const customers = await response.json();

    const select = document.getElementById('customerSelect');
    select.innerHTML = '';

    customers.forEach(customer => {
      const option = document.createElement('option');
      option.value = customer.id;
      option.text = "Customer " + customer.id + " (Points: " + customer.rewardPoints + ")";
      select.appendChild(option);
    });
  }

  async function createCustomer() {
    const response = await fetch('/customers', { method: 'POST' });
    await loadCustomers();
  }

  async function startQuiz() {
    const select = document.getElementById('customerSelect');
    customerId = select.value;

    const response = await fetch('/questions');
    questions = await response.json();

    currentQuestionIndex = 0;

    document.getElementById('customerSection').style.display = 'none';
    document.getElementById('quizSection').style.display = 'block';

    showQuestion();
  }

  function showQuestion() {
    const question = questions[currentQuestionIndex];
    document.getElementById('questionText').innerText = question.questionText;
    document.getElementById('progress').innerText =
        "Question " + (currentQuestionIndex + 1) + " of " + questions.length;
  }

  async function submitAnswer() {
    const answer = document.getElementById('answerInput').value;

    await fetch(`/customers/${customerId}/answer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        questionId: questions[currentQuestionIndex].id,
        answer: answer
      })
    });

    document.getElementById('answerInput').value = '';

    currentQuestionIndex++;

    if (currentQuestionIndex < questions.length) {
      showQuestion();
    } else {
      await finishQuiz();
    }
  }

  async function finishQuiz() {
    const response = await fetch(`/customers`);
    const customers = await response.json();

    const customer = customers.find(c => c.id == customerId);

    document.getElementById('quizSection').style.display = 'none';
    document.getElementById('resultSection').style.display = 'block';

    document.getElementById('finalScore').innerText =
        "Final Reward Points: " + customer.rewardPoints;
  }

  function goToStart() {

    // Reset quiz state
    currentQuestionIndex = 0;
    questions = [];
    customerId = null;

    // Hide result & quiz
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('quizSection').style.display = 'none';

    // Show customer selection
    document.getElementById('customerSection').style.display = 'block';

    // Clear answer input
    document.getElementById('answerInput').value = '';

    // Reload customers (to update points display)
    loadCustomers();
  }

</script>

</body>
</html>
